<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Kalkulator Gizi</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
}

.layout {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #111827;
  color: white;
  min-height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  background: #1f2937;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
}

.sidebar button:hover {
  background: #374151;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

.section {
  display: none;
}

.section.active {
  display: block;
}
</style>

</head>
<body>

<div class="layout">
<button onclick="toggleSidebar()" style="position:fixed; top:10px; left:10px; z-index:1000;">
☰
</button>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📊 Menu</h2>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('inputMenu')">Input Menu</button>
    <button onclick="showSection('hasilGizi')">Hasil Perhitungan Gizi</button>
    <button onclick="showSection('createLaporan')">Create Laporan</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">

      <div class="app">

        <!-- HEADER -->
        <div class="header">
          <img src="logo.png" class="logo" />
          <h1>SPPG Cicadas 01</h1>
          <p class="ahli-gizi">Ahli Gizi : Aliyah Khairunnisa Syafitri</p>
          <p class="credit">Created by Fikri Purwana Senja</p>
        </div>

        <!-- INPUT CARD -->
        <div class="card dark">

          <h2>Input Bahan</h2>

          <div class="menu-row">
            <button id="btnOmprengan"
                    onclick="setModeMenu('OMPRENGAN')"
                    class="btn-secondary active-omprengan">
              Menu Omprengan
            </button>

            <button id="btnSnack"
                    onclick="setModeMenu('SNACK')"
                    class="btn-secondary">
              Menu Snack
            </button>
          </div>

          <div id="kategoriCheckbox" class="kategori-scroll"></div>

          <div class="input-row input-row-flex">

            <div class="autocomplete-wrapper">
              <input type="text" id="namaBahan" autocomplete="off">
              <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>

            <input id="beratBahan" type="number" placeholder="Jumlah" class="input-jumlah">

            <select id="satuanBahan" class="input-satuan">
              <option value="Gram">Gram</option>
              <option value="Pcs">Pcs</option>
            </select>

            <button type="button" class="btn-primary" onclick="tambahBahan()">
              Tambah
            </button>

          </div>

          <ul id="listBahan"></ul>

          <div class="action-row">
            <button class="btn-success" onclick="generateLaporan()">Generate Laporan</button>
            <button class="btn-secondary" onclick="exportPDF()">Export PDF</button>
            <button class="btn-kirim" onclick="kirimLaporanKeSpreadsheet()">Kirim Spreadsheet</button>
          </div>

        </div>

        <div id="hasil-wrapper-dashboard" class="table-container">
          <div id="hasilDashboard" class="hasil-grid"></div>
        </div>

        <div class="card dark" id="cardCreateLaporan">

      </div>
    </div>

    <!-- INPUT MENU ONLY -->
    <div id="inputMenu" class="section">
  <div class="header">
    <h1>Input Menu</h1>
  </div>

    <div id="inputMenuMirror"></div>
  </div>

    <!-- HASIL GIZI -->
    <div id="hasilGizi" class="section">
      <div class="header">
        <h1>Hasil Perhitungan Gizi</h1>
      </div>

      <div id="hasil-wrapper-gizi" class="table-container">
        <div id="hasilGiziTable" class="hasil-grid"></div>
      </div>
    </div>

    <!-- CREATE LAPORAN -->
    <div id="createLaporan" class="section">

      <div class="card dark" id="cardCreateLaporan">
        <h2>📊 Create Laporan</h2>

        <div class="tab-row">
          <button id="tabLaporan" class="btn-secondary active-tab" onclick="setMainTab('laporan')">
            📊 Laporan
          </button>

          <button id="tabCaption" class="btn-secondary" onclick="setMainTab('caption')">
            📝 Caption
          </button>
        </div>

        <div id="menuContainer">
          <input type="text" class="input-menu" placeholder="Nama menu" oninput="updateMenuAwal(this.value)">
          <button class="btn-secondary" onclick="tambahMenuBaris()">+ Tambah Menu</button>
        </div>

        <button class="btn-success" onclick="bukaModalLibur()">
          🚀 Generate
        </button>
      </div>

      <div class="card dark card-hasil">
        <div class="card-hasil-header">
          <h3>Hasil Laporan</h3>
        </div>

        <textarea id="captionOutput"></textarea>

        <button class="btn-copy" onclick="copyCaptionWA()">
          📋 Copy WA
        </button>
      </div>

    </div>

  </div>
</div>

<script>
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
  });
  document.getElementById(sectionId).classList.add('active');
}
</script>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
