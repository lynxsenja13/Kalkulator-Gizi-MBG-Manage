<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Kalkulator Gizi</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <h2 class="sidebar-title">Menu</h2>

    <button onclick="showMenu('dashboard')" class="sidebar-btn active">📊 Dashboard</button>
    <button onclick="showMenu('input')" class="sidebar-btn">🧾 Input Bahan</button>
    <button onclick="showMenu('hasil')" class="sidebar-btn">📈 Hasil Gizi</button>
    <button onclick="showMenu('laporan')" class="sidebar-btn">📝 Create Laporan</button>
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
      <h3>SPPG Cicadas 01</h3>
    </div>

    <!-- ================= DASHBOARD ================= -->
    <div id="menu-dashboard" class="menu-section">

      <div class="app">

        <!-- HEADER -->
        <div class="header">
          <img src="logo.png" class="logo">
          <h1>SPPG Cicadas 01</h1>
          <p class="ahli-gizi">Ahli Gizi : Aliyah Khairunnisa Syafitri</p>
          <p class="credit">Created by Fikri Purwana Senja</p>
        </div>

        <!-- INPUT -->
        <div class="card dark">
          <h2>Input Bahan</h2>

          <div class="menu-row">
            <button onclick="setModeMenu('OMPRENGAN')" class="btn-secondary active-omprengan">Menu Omprengan</button>
            <button onclick="setModeMenu('SNACK')" class="btn-secondary">Menu Snack</button>
          </div>

          <div id="kategoriCheckbox" class="kategori-scroll"></div>

          <div class="input-row input-row-flex">
            <input type="text" id="namaBahan">
            <input id="beratBahan" type="number" placeholder="Jumlah">
            <select id="satuanBahan">
              <option value="Gram">Gram</option>
              <option value="Pcs">Pcs</option>
            </select>
            <button class="btn-primary" onclick="tambahBahan()">Tambah</button>
          </div>

          <ul id="listBahan"></ul>
        </div>

        <!-- HASIL -->
        <div id="hasil-wrapper">
          <div id="hasil"></div>
        </div>

      </div>
    </div>

    <!-- ================= INPUT ================= -->
    <div id="menu-input" class="menu-section" style="display:none;">
      <div class="app">
        <div class="header">
          <h2>Input Bahan</h2>
        </div>
         <div class="card dark">
          <h2>Input Bahan</h2>

          <div class="menu-row">
            <button onclick="setModeMenu('OMPRENGAN')" class="btn-secondary active-omprengan">Menu Omprengan</button>
            <button onclick="setModeMenu('SNACK')" class="btn-secondary">Menu Snack</button>
          </div>

          <div id="kategoriCheckbox" class="kategori-scroll"></div>

          <div class="input-row input-row-flex">
            <input type="text" id="namaBahan">
            <input id="beratBahan" type="number" placeholder="Jumlah">
            <select id="satuanBahan">
              <option value="Gram">Gram</option>
              <option value="Pcs">Pcs</option>
            </select>
            <button class="btn-primary" onclick="tambahBahan()">Tambah</button>
          </div>

          <ul id="listBahan"></ul>
        </div>
      </div>
    </div>

    <!-- ================= HASIL ================= -->
    <div id="menu-hasil" class="menu-section" style="display:none;">
      <div class="app">
        <div class="header">
          <h2>Hasil Perhitungan Gizi</h2>
        </div>
        <div id="hasil-wrapper">
          <div id="hasil"></div>
        </div>
      </div>
    </div>

    <!-- ================= LAPORAN ================= -->
    <div id="menu-laporan" class="menu-section" style="display:none;">
      <div class="app">

        <div class="header">
          <h2>Create Laporan</h2>
        </div>

        <div class="card dark">
          <button class="btn-success" onclick="bukaModalLibur()">🚀 Generate</button>
        </div>

        <div class="card dark">
          <textarea id="captionOutput"></textarea>
          <button onclick="copyCaptionWA()">📋 Copy</button>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="modalLibur" class="modal">
  <div class="modal-content">
    <h3>Siapa yang libur?</h3>

    <label>Balita <input type="checkbox" id="libur_balita"></label>
    <label>Bumil <input type="checkbox" id="libur_bumil"></label>

    <button onclick="tutupModalLibur()">Batal</button>
    <button onclick="prosesGenerateLaporan()">Lanjut</button>
  </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
